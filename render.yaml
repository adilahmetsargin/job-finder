services:
  - type: web
    name: job-finder-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HF_MODEL
        value: meta-llama/Llama-3.1-8B-Instruct
      - key: HF_PROVIDER
        value: novita
      - key: HF_TOKEN
        sync: false
